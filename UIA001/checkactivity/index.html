<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Activity</title>

    <link rel="stylesheet" href="./checkactivity.css">
    <link rel="stylesheet" href="../admin-home.css">
    <link rel="stylesheet" href="../../CSS/general.css">
</head>
<body>
    <div class="admin-cms-header" id="js-admin-cms-header">
        <div class="top">
            <div class="logo-container">
                <img src="../../Images/logo.webp" alt="">
            </div>

            <div class="return-link-container">
                <a href="../index.html">
                    Back
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                        <path d="m560-240-56-58 142-142H160v-80h486L504-662l56-58 240 240-240 240Z"/>
                    </svg>
                </a>
            </div>
        </div>

        <div class="header-container" id="js-header-container">
            <div class="cms-header">
                Check Acivity
            </div>
        </div>
    </div>


    <section class="dash-container" id="js-dash-conatainer">
        <div class="trending-products-dash dashboard">
            <h2>Trending  Products</h2>

            <div class="containers-wrapper" id="js-trending-products-dash"></div>
        </div>


        <div class="most-searched-dash dashboard">
            <h2>Most Searched For</h2>

            <div class="containers-wrapper"  id="js-most-searched-dash"></div>
        </div>


        <div class="most-viewed-dash dashboard">
            <h2>Most Viewed</h2>

            <div class="containers-wrapper">
                <div class="top" id="js-most-viewed-dash-top"></div>

                <div class="bottom" id="js-most-viewed-dash-bottom"></div>
            </div>
        </div>


        <div class="most-ordered-dash dashboard">
            <h2>Most Ordered</h2>

            <div class="containers-wrapper"  id="js-most-ordered-dash"></div>
        </div>


        <div class="failed-queries-dash dashboard">
            <h2>Failed Queries</h2>

            <div class="queries-wrapper"  id="js-failed-queries-dash"></div>
        </div>

        <div class="google-analytics-dash-link dashboard">
            <h2>View Analytics by Google</h2>
            <a href="#">
                <svg width="20px" height="20px" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30.0014 16.3109C30.0014 15.1598 29.9061 14.3198 29.6998 13.4487H16.2871V18.6442H24.1601C24.0014 19.9354 23.1442 21.8798 21.2394 23.1864L21.2127 23.3604L25.4536 26.58L25.7474 26.6087C28.4458 24.1665 30.0014 20.5731 30.0014 16.3109Z" fill="#4285F4"/>
                    <path d="M16.2863 29.9998C20.1434 29.9998 23.3814 28.7553 25.7466 26.6086L21.2386 23.1863C20.0323 24.0108 18.4132 24.5863 16.2863 24.5863C12.5086 24.5863 9.30225 22.1441 8.15929 18.7686L7.99176 18.7825L3.58208 22.127L3.52441 22.2841C5.87359 26.8574 10.699 29.9998 16.2863 29.9998Z" fill="#34A853"/>
                    <path d="M8.15964 18.769C7.85806 17.8979 7.68352 16.9645 7.68352 16.0001C7.68352 15.0356 7.85806 14.1023 8.14377 13.2312L8.13578 13.0456L3.67083 9.64746L3.52475 9.71556C2.55654 11.6134 2.00098 13.7445 2.00098 16.0001C2.00098 18.2556 2.55654 20.3867 3.52475 22.2845L8.15964 18.769Z" fill="#FBBC05"/>

                </svg>
                oogle Analytics
            </a>
        </div>
    </section>
    


    <div class="toasttips">
        <div class="fail-toast toasttip" id="js-fail-toast">
            <p>Unsuccessful <span>Try Again</span></p> 
            <svg xmlns="http://www.w3.org/2000/svg" height="19px" viewBox="0 -960 960 960" width="19px" fill="#e3e3e3"><path d="M440-400v-360h80v360h-80Zm0 200v-80h80v80h-80Z"/></svg>
        </div>
    </div>
    <div class="loading-screen" id="js-loading-screen"></div>
    <div class="loader" id="js-loader"></div>
    <div class="black-screen" id="js-black-screen"></div>

    <script type="module" src="./checkactivity.js"></script>
</body>
</html>
